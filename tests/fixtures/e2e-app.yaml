version: 1
clientInstance:
  id: demo-e2e
  displayName: Demo E2E Client Instance
  environment: development
auth:
  standalone:
    enabled: true
    baseUrl: http://127.0.0.1:4210/api/auth
    trustedOrigins:
      - http://127.0.0.1:5273
    seedUsers:
      - email: e2e-superadmin@example.test
        emailEnvName: E2E_SUPERADMIN_EMAIL
        displayLabel: E2E Superadmin
        passwordEnvName: E2E_SUPERADMIN_PASSWORD
        developmentPassword: e2e-superadmin-password
        roles:
          - user
          - admin
          - superadmin
        permissionRefs:
          - demo-tools
      - email: e2e-user@example.test
        emailEnvName: E2E_USER_EMAIL
        displayLabel: E2E User
        passwordEnvName: E2E_USER_PASSWORD
        developmentPassword: e2e-user-password
        roles:
          - user
        permissionRefs:
          - demo-tools
retention:
  conversationDays: 1
  auditDays: 30
  allowUserDelete: true
modelProviders:
  - id: local
    type: deterministic
    model: deterministic-local
usage:
  budget:
    costSafetyMultiplier: 1
  safeguards:
    modelCallsPerDay: 12
    tokensPerDay: 25000
    tokensPerMonth: 250000
  pricing:
    currency: USD
    models:
      - providerId: local
        model: deterministic-local
        inputPricePerMillionTokens: 0
        outputPricePerMillionTokens: 0
defaultAgentName: application_assistant
agents:
  - name: application_assistant
    displayName: Application Assistant
    modelProviderId: local
    instructions: |
      You help users work through sensitive application and document review workflows.
    toolNames:
      - document.application_summary
    initialPrompts:
      - title: Find review risks
        prompt: List the most important application or document review risks I should check first.
  - name: research_assistant
    displayName: Research Assistant
    modelProviderId: local
    instructions: |
      You help users summarize policy and research context for sensitive workflows.
    toolNames: []
    initialPrompts:
      - title: Summarize policy
        prompt: Summarize the policy context I should consider first.
tools:
  - name: document.application_summary
    enabled: true
ui:
  clientName: E2E Customer
  title: Agent Chat E2E
  welcomeMessage: E2E ready.
  accentColor: "#0f766e"
  theme:
    accentColor: "#0f766e"
    accentStrongColor: "#0b5f59"
    backgroundColor: "#f4f1ea"
    surfaceColor: "#fffdfa"
    textColor: "#17201d"
    mutedTextColor: "#657069"
    borderColor: "#d8d2c5"
