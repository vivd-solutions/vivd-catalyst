version: 1
clientInstance:
  id: demo-local
  displayName: Vivd Catalyst Demo
  environment: development
auth:
  standalone:
    enabled: true
    baseUrl: http://127.0.0.1:4100/api/auth
    trustedOrigins:
      - http://127.0.0.1:5173
      - http://localhost:5173
      - http://127.0.0.1:5273
      - http://localhost:5273
    seedUsers:
      - displayLabel: Demo Superadmin
        email: superadmin@example.test
        emailEnvName: DEMO_SUPERADMIN_EMAIL
        passwordEnvName: DEMO_SUPERADMIN_PASSWORD
        developmentPassword: demo-superadmin-password
        roles:
          - user
          - admin
          - superadmin
        permissionRefs:
          - demo-tools
      - displayLabel: Demo User
        email: user@example.test
        emailEnvName: DEMO_USER_EMAIL
        passwordEnvName: DEMO_USER_PASSWORD
        developmentPassword: demo-user-password
        roles:
          - user
        permissionRefs:
          - demo-tools
  sessionToken:
    issuer: demo-client-instance
    ttlSeconds: 900
retention:
  conversationDays: 30
  auditDays: 365
  allowUserDelete: true
modelProviders:
  - id: openai
    type: openai-compatible
    model: gpt-4.1
    baseUrl: https://api.openai.com/v1
    apiKeyEnvName: OPENAI_API_KEY
localization:
  defaultLocale: en
  supportedLocales:
    - de
    - en
conversationTitles:
  enabled: true
  modelProviderId: openai
  model: gpt-5-nano
usage:
  budget:
    monthlySpendLimit: 200
    costSafetyMultiplier: 1.3
  safeguards:
    modelCallsPerDay: 1000
    tokensPerDay: 2500000
    tokensPerMonth: 50000000
  pricing:
    currency: USD
    models:
      - providerId: openai
        model: gpt-4.1
        inputPricePerMillionTokens: 2
        outputPricePerMillionTokens: 8
      - providerId: openai
        model: gpt-5-nano
        inputPricePerMillionTokens: 0.05
        outputPricePerMillionTokens: 0.4
defaultAgentName: workflow_assistant
agentFiles:
  - ../agents/workflow-assistant.agent.yaml
tools:
  - name: demo.workflow_summary
    enabled: true
uiFile: ./ui.yaml
