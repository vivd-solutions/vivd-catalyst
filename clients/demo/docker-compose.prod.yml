x-client-build-args: &client-build-args
  APP_PACKAGE: "@vivd-catalyst/demo"
  SERVER_ENTRY: platform/clients/demo/dist/server.js
  UI_PACKAGE: "@vivd-catalyst/demo"
  UI_DIST_DIR: platform/clients/demo/dist/client
  VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-}

x-client-build: &client-build
  context: ../../..
  dockerfile: platform/docker/vivd-client.Dockerfile
  args:
    <<: *client-build-args

x-app-environment: &app-environment
  CLIENT_CONFIG_PATH: /app/platform/clients/demo/config/app.yaml
  DATABASE_URL: ${DATABASE_URL:-postgres://agent_chat:agent_chat@postgres:5432/agent_chat}
  DOCUMENT_OBJECT_STORE_ENDPOINT: ${DOCUMENT_OBJECT_STORE_ENDPOINT:-}
  DOCUMENT_OBJECT_STORE_BUCKET: ${DOCUMENT_OBJECT_STORE_BUCKET:-vivd-catalyst-documents}
  DOCUMENT_OBJECT_STORE_REGION: ${DOCUMENT_OBJECT_STORE_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  DOCUMENT_WORKER_TOKEN: ${DOCUMENT_WORKER_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_chat}
      POSTGRES_DB: ${POSTGRES_DB:-agent_chat}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12

  doc-worker:
    build:
      <<: *client-build
      target: doc-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 4110
      RUN_MIGRATIONS: "false"
      DOCUMENT_WORKER_CONCURRENCY: ${DOCUMENT_WORKER_CONCURRENCY:-2}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      <<: *client-build
      target: api
    depends_on:
      postgres:
        condition: service_healthy
      doc-worker:
        condition: service_healthy
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 4100
      RUN_MIGRATIONS: "true"
      DOCUMENT_WORKER_URL: http://doc-worker:4110
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:4100/api/auth}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      CHAT_UI_ORIGIN: ${CHAT_UI_ORIGIN:-}
      DEMO_SUPERADMIN_EMAIL: ${DEMO_SUPERADMIN_EMAIL:-}
      DEMO_SUPERADMIN_PASSWORD: ${DEMO_SUPERADMIN_PASSWORD:-}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-}
      CHAT_SESSION_TOKEN_SECRET: ${CHAT_SESSION_TOKEN_SECRET:-}
      CHAT_SERVER_CREDENTIAL: ${CHAT_SERVER_CREDENTIAL:-}
    ports:
      - "${API_HOST_PORT:-4100}:4100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12

  ui:
    build:
      <<: *client-build
      target: ui
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-8080}:80"

volumes:
  postgres-data:
