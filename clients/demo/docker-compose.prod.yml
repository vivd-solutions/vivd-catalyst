x-client-build-args: &client-build-args
  APP_PACKAGE: "@vivd-catalyst/demo"
  SERVER_ENTRY: clients/demo/dist/server.js
  UI_PACKAGE: "@vivd-catalyst/demo"
  UI_DIST_DIR: clients/demo/dist/client
  NGINX_CONFIG_PATH: docker/nginx-spa.conf
  VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-}

x-client-build: &client-build
  context: ../..
  dockerfile: docker/vivd-client.Dockerfile
  args:
    <<: *client-build-args

x-migrate-command: &migrate-command
  [
    "node",
    "--input-type=module",
    "-e",
    "import { createPlatformStore } from '@vivd-catalyst/client-assembly'; const store = await createPlatformStore({ env: process.env }); await store.close?.();"
  ]

x-app-environment: &app-environment
  CLIENT_CONFIG_PATH: /app/clients/demo/config/app.yaml
  DATABASE_URL: ${DATABASE_URL:-postgres://agent_chat:agent_chat@postgres:5432/agent_chat}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_chat}
      POSTGRES_DB: ${POSTGRES_DB:-agent_chat}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      <<: *client-build
      target: api
    working_dir: /app/clients/demo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "true"
    command: *migrate-command

  api:
    build:
      <<: *client-build
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 4100
      RUN_MIGRATIONS: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:8080/api/auth}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      CHAT_UI_ORIGIN: ${CHAT_UI_ORIGIN:-http://127.0.0.1:8080}
      DEMO_SUPERADMIN_EMAIL: ${DEMO_SUPERADMIN_EMAIL:?DEMO_SUPERADMIN_EMAIL is required}
      DEMO_SUPERADMIN_PASSWORD: ${DEMO_SUPERADMIN_PASSWORD:?DEMO_SUPERADMIN_PASSWORD is required}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-}
      CHAT_SESSION_TOKEN_SECRET: ${CHAT_SESSION_TOKEN_SECRET:?CHAT_SESSION_TOKEN_SECRET is required}
      CHAT_SERVER_CREDENTIAL: ${CHAT_SERVER_CREDENTIAL:?CHAT_SERVER_CREDENTIAL is required}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12

  ui:
    build:
      <<: *client-build
      target: ui
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_started
    ports:
      - "${HTTP_HOST_PORT:-8080}:80"
    volumes:
      - ../../docker/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
