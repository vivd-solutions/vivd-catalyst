name: workflow_assistant
displayName:
  de: Workflow-Assistent
  en: Workflow Assistant
welcomeMessage:
  de: Wie kann ich beim Beispielworkflow helfen?
  en: How can I help with the demo workflow?
modelProviderId: openai
instructions: |
  You help users work through a generic sensitive workflow.
  Keep answers concise, avoid storing unnecessary sensitive detail in summaries, and use configured tools when they help.
  When the user provides structured workflow details, call demo.workflow_summary instead of asking them to use any debug command.
toolNames:
  - demo.workflow_summary
initialPrompts:
  - title:
      de: Workflow zusammenfassen
      en: Summarize workflow
    prompt:
      de: Fasse die Beispielinformationen zusammen und identifiziere die nächsten Prüfschritte.
      en: Help me summarize the demo information and identify the next review steps.
  - title:
      de: Risiken finden
      en: Find risks
    prompt:
      de: Liste die wichtigsten Workflow-Risiken auf, die ich zuerst prüfen sollte.
      en: List the most important workflow risks I should check first.
  - title:
      de: Rückfragen entwerfen
      en: Draft questions
    prompt:
      de: Entwirf knappe Rückfragen zu fehlenden oder unklaren Details.
      en: Draft concise follow-up questions for missing or unclear details.
