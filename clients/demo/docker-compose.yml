x-client-build-args: &client-build-args
  APP_PACKAGE: "@vivd-catalyst/demo"
  SERVER_ENTRY: platform/clients/demo/dist/server.js
  UI_PACKAGE: "@vivd-catalyst/demo"
  UI_DIST_DIR: platform/clients/demo/dist/client
  VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-}
  VITE_CHAT_API_PORT: ${VITE_CHAT_API_PORT:-4100}

x-client-build: &client-build
  context: ../../..
  dockerfile: platform/docker/vivd-client.Dockerfile
  args:
    <<: *client-build-args

x-migrate-command: &migrate-command
  [
    "node",
    "--input-type=module",
    "-e",
    "import { createPlatformStore } from '@vivd-catalyst/client-assembly'; const store = await createPlatformStore({ env: process.env }); await store.close?.();"
  ]

x-app-environment: &app-environment
  CLIENT_CONFIG_PATH: /app/platform/clients/demo/config/app.yaml
  DATABASE_URL: postgres://agent_chat:agent_chat@postgres:5432/agent_chat
  DOCUMENT_OBJECT_STORE_ENDPOINT: http://s3mock:9090
  DOCUMENT_OBJECT_STORE_BUCKET: vivd-catalyst-documents
  AWS_ACCESS_KEY_ID: s3mock
  AWS_SECRET_ACCESS_KEY: s3mock
  DOCUMENT_WORKER_TOKEN: ${DOCUMENT_WORKER_TOKEN:-dev-document-worker-token}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: agent_chat
      POSTGRES_PASSWORD: agent_chat
      POSTGRES_DB: agent_chat
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_chat -d agent_chat"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12

  s3mock:
    image: adobe/s3mock:${S3MOCK_VERSION:-latest}
    environment:
      initialBuckets: vivd-catalyst-documents
    ports:
      - "${S3MOCK_HOST_PORT:-9090}:9090"

  migrate:
    build:
      <<: *client-build
      target: api
    working_dir: /app/platform/clients/demo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "true"
    command: *migrate-command

  doc-worker:
    build:
      <<: *client-build
      target: doc-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      s3mock:
        condition: service_started
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 4110
      RUN_MIGRATIONS: "false"
      DOCUMENT_WORKER_CONCURRENCY: ${DOCUMENT_WORKER_CONCURRENCY:-2}
    ports:
      - "${DOCUMENT_WORKER_HOST_PORT:-4110}:4110"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      <<: *client-build
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      s3mock:
        condition: service_started
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 4100
      RUN_MIGRATIONS: "false"
      DOCUMENT_WORKER_URL: http://doc-worker:4110
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:4100/api/auth}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-with-at-least-32-random-characters}
      CHAT_UI_ORIGIN: ${CHAT_UI_ORIGIN:-http://127.0.0.1:5173}
      DEMO_SUPERADMIN_EMAIL: ${DEMO_SUPERADMIN_EMAIL:-superadmin@example.test}
      DEMO_SUPERADMIN_PASSWORD: ${DEMO_SUPERADMIN_PASSWORD:-demo-superadmin-password}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-user@example.test}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-demo-user-password}
      CHAT_SESSION_TOKEN_SECRET: ${CHAT_SESSION_TOKEN_SECRET:-replace-with-at-least-24-random-characters}
      CHAT_SERVER_CREDENTIAL: ${CHAT_SERVER_CREDENTIAL:-replace-with-a-server-to-server-secret}
    ports:
      - "${API_HOST_PORT:-4100}:4100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12

  ui:
    build:
      <<: *client-build
      target: ui
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-5173}:80"

volumes:
  postgres-data:
