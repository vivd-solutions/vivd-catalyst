services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: agent_chat
      POSTGRES_PASSWORD: agent_chat
      POSTGRES_DB: agent_chat
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_chat -d agent_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: clients/demo/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4100
      CLIENT_CONFIG_PATH: clients/demo/config/app.yaml
      DATABASE_URL: postgres://agent_chat:agent_chat@postgres:5432/agent_chat
      RUN_MIGRATIONS: "true"
    ports:
      - "4100:4100"

volumes:
  postgres-data:
